# Failure notifications: GitHub sends an email on first failure of a previously-
# succeeding run to all repo watchers who have Actions email notifications enabled.
# Deb: confirm your setting at github.com/settings/notifications under
# "Actions" → "Only notify for failed workflows".
# A Slack notification to #resonate-lab is also sent (see final step below).
# Pre-requisite: repo secret SLACK_WEBHOOK_URL must be set — see architecture.md.

name: Update planning data

on:
  schedule:
    - cron: '0 18 * * 0'    # Sun 18:00 UTC = Mon 06:00 ACDT (UTC+10:30)
  workflow_dispatch:
    inputs:
      mode:
        description: 'discover or build'
        required: true
        default: 'build'
        type: choice
        options:
          - discover
          - build
      test_slack_notification:
        description: 'Force a failure to test the Slack notification'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-planning-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Force failure for Slack notification test
        if: inputs.test_slack_notification == 'true'
        run: |
          echo "::error::Test failure — triggered by test_slack_notification=true input. This is intentional."
          exit 1

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create data branch
        run: |
          BRANCH="chore/data-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Run planning data script
        env:
          MODE: ${{ inputs.mode || 'build' }}
        run: node scripts/update-planning-data.js

      - name: Commit data files
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore(data): refresh planning data ${{ github.run_id }} (${{ inputs.mode || 'build' }})"
          file_pattern: 'data/**'
          branch: ${{ env.BRANCH }}
          push_options: '--set-upstream'

      - name: Open pull request
        if: steps.auto-commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "chore(data): refresh planning data (${{ inputs.mode || 'build' }})" \
            --body "Automated data refresh — run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." \
            --base main \
            --head "$BRANCH"

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          payload: |
            {
              "text": ":rotating_light: *Planning data refresh failed*\n*Workflow:* ${{ github.workflow }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\n*Triggered by:* ${{ github.event_name }}\n*Branch:* ${{ github.ref_name }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
